<!-- contact-page.html -->

<section class="contact-hero">
  <div class="overlay"></div>

  <div class="contact-hero-content">
    <p class="subtitle">CONTACT US</p>

    <h1>
      Let’s Talk About <br />
      Your Next Ride
    </h1>

    <p>
      Have questions about our motorcycles, services, or pricing?
      Our team is always ready to help you.
    </p>
  </div>
</section>

<section class="contact-section">

  <div class="contact-container">

    <!-- LEFT -->
    <div class="contact-info">

      <div class="info-card">
        <i class="ri-map-pin-line"></i>

        <div>
          <h3>Location</h3>
          <p>Cairo, Egypt</p>
        </div>
      </div>

      <div class="info-card">
        <i class="ri-phone-line"></i>

        <div>
          <h3>Phone</h3>
          <p>+20 100 123 4567</p>
        </div>
      </div>

      <div class="info-card">
        <i class="ri-mail-line"></i>

        <div>
          <h3>Email</h3>
          <p>support@steed.com</p>
        </div>
      </div>

      <div class="info-card">
        <i class="ri-time-line"></i>

        <div>
          <h3>Working Hours</h3>
          <p>Sun - Thu | 9AM - 6PM</p>
        </div>
      </div>

    </div>

    <!-- RIGHT -->
    <form class="contact-form">

      <div class="input-group">
        <input type="text" placeholder="Your Name" />
      </div>

      <div class="input-group">
        <input type="email" placeholder="Your Email" />
      </div>

      <div class="input-group">
        <input type="text" placeholder="Subject" />
      </div>

      <div class="input-group">
        <textarea rows="6" placeholder="Your Message"></textarea>
      </div>

      <button type="submit" class="submit-btn">
        Send Message
      </button>

    </form>

  </div>

</section>

<section class="map-section">
  <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3454.823644091468!2d31.235712!3d30.044420!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x145840c7b0d1d3f1%3A0x2d7f2d8b7d1d1e8f!2sCairo!5e0!3m2!1sen!2seg!4v1710000000000!5m2!1sen!2seg"
    width="100%"
    height="450"
    style="border:0;"
    allowfullscreen=""
    loading="lazy">
  </iframe>
</section>
