<nav class="pagination-shell" aria-label="Motorcycle page navigation">
  <button class="page-button" type="button" (click)="previous()" [disabled]="currentPage === 1">
    <i class="fa-solid fa-chevron-left"></i>
  </button>
  <button
    class="page-button"
    type="button"
    *ngFor="let page of pages"
    [class.active]="page === currentPage"
    (click)="goToPage(page)">
    {{ page }}
  </button>
  <button class="page-button" type="button" (click)="next()" [disabled]="currentPage === totalPages">
    <i class="fa-solid fa-chevron-right"></i>
  </button>
</nav>
