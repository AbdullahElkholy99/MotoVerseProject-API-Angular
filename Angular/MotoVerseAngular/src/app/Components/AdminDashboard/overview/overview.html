<div class="admin-page">
  <div class="top-grid">
    <mv-stat-card title="Total Bookings" [value]="bookings.length"></mv-stat-card>
    <mv-stat-card title="Active Rentals" [value]="bookings.filter(b=>b.bookingStatus==='Active').length"></mv-stat-card>
    <mv-stat-card title="Pending Bookings" [value]="bookings.filter(b=>b.bookingStatus==='Pending').length"></mv-stat-card>
    <mv-stat-card title="Completed" [value]="bookings.filter(b=>b.bookingStatus==='Completed').length"></mv-stat-card>
  </div>

  <div class="charts">
    <div class="chart-card"> <!-- placeholder sparkline -->
      <h4>Revenue (mock)</h4>
      <div class="chart-placeholder">$ {{ totalRevenue.toFixed(2) }}</div>
    </div>

    <div class="chart-card">
      <h4>Booking Status</h4>
      <div class="chart-placeholder">Pie Chart Placeholder</div>
    </div>
  </div>

  <div class="recent">
    <div class="recent-bookings">
      <h4>Recent Bookings</h4>
      <table class="simple-table">
        <thead><tr><th>ID</th><th>Bike</th><th>Status</th><th>Price</th></tr></thead>
        <tbody>
          <tr *ngFor="let b of bookings | slice:0:6">
            <!-- <td>{{ b.id }}</td>
            <td>{{ b.motorcycle.brand }} {{ b.motorcycle.name }}</td>
            <td>{{ b.bookingStatus }}</td>
            <td>${{ b.totalPrice.toFixed(2) }}</td> -->
          </tr>
        </tbody>
      </table>
    </div>

    <div class="recent-payments">
      <h4>Recent Payments</h4>
      <div class="list">Placeholder recent payments</div>
    </div>
  </div>
</div>
