<section class="page-header">
  <div>
    <h2>Settings</h2>
    <p>Configure account preferences, notification rules, and theme appearance.</p>
  </div>
  <div class="header-pill">Admin preferences</div>
</section>

<div class="settings-grid">
  <article class="settings-card">
    <h3>Admin profile</h3>
    <div class="profile-fields">
      <label>Name</label>
      <input type="text" [(ngModel)]="profile.name" />
      <label>Email</label>
      <input type="email" [(ngModel)]="profile.email" />
      <label>Phone</label>
      <input type="tel" [(ngModel)]="profile.phone" />
      <button type="button" class="btn-primary">Save profile</button>
    </div>
  </article>

  <article class="settings-card">
    <h3>Change password</h3>
    <div class="profile-fields">
      <label>Current password</label>
      <input type="password" [(ngModel)]="password.current" />
      <label>New password</label>
      <input type="password" [(ngModel)]="password.newPassword" />
      <label>Confirm new password</label>
      <input type="password" [(ngModel)]="password.confirm" />
      <button type="button" class="btn-secondary">Update password</button>
    </div>
  </article>

  <article class="settings-card settings-card--wide">
    <h3>Notification settings</h3>
    <div class="toggle-row">
      <span>Email alerts</span>
      <label class="switch">
        <input type="checkbox" [(ngModel)]="notifications.email" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span>SMS notifications</span>
      <label class="switch">
        <input type="checkbox" [(ngModel)]="notifications.sms" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span>Product updates</span>
      <label class="switch">
        <input type="checkbox" [(ngModel)]="notifications.updates" />
        <span class="slider"></span>
      </label>
    </div>

    <h3>Theme settings</h3>
    <div class="theme-options">
      <label>
        <input type="radio" name="theme" value="Dark" [(ngModel)]="theme" />
        Dark mode
      </label>
      <label>
        <input type="radio" name="theme" value="Light" [(ngModel)]="theme" />
        Light mode
      </label>
      <label>
        <input type="radio" name="theme" value="Auto" [(ngModel)]="theme" />
        Auto
      </label>
    </div>
  </article>
</div>
