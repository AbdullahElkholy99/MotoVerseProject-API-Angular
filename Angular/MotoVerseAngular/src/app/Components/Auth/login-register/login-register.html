<div class="auth-page">
  <div class="container" [class.active]="isRegisterMode()">
    <!-- Sign Up -->
    <div class="form-container sign-up">
      <form>

        <div class="social-icons">
          <a href="#" class="icon">
            <i class="fa-brands fa-google-plus-g"></i>
          </a>
          <a href="#" class="icon">
            <i class="fa-brands fa-facebook-f"></i>
          </a>
          <a href="#" class="icon">
            <i class="fa-brands fa-github"></i>
          </a>
          <a href="#" class="icon">
            <i class="fa-brands fa-linkedin-in"></i>
          </a>
        </div>

        <span>or use your email for registration</span>

        <app-register-page/>

      </form>
    </div>

    <!-- Sign In -->
    <div class="form-container sign-in">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <h1>Sign In</h1>

        <div class="social-icons">
          <a href="#" class="icon">
            <i class="fa-brands fa-google"></i>
          </a>

          <a href="#" class="icon">
            <i class="fa-brands fa-facebook-f"></i>
          </a>

          <a href="#" class="icon">
            <i class="fa-brands fa-github"></i>
          </a>

          <a href="#" class="icon">
            <i class="fa-brands fa-linkedin-in"></i>
          </a>
        </div>

        <span>or use your email password</span>

        <input type="email" placeholder="Email" formControlName="email" />

        <input [type]="showPassword ? 'text' : 'password'" placeholder="Password" formControlName="password"/>

        <a routerLink="/forgot-password">Forgot Password?</a>

        <button type="submit" [disabled]="isSubmitting()">
          {{ isSubmitting() ? 'Signing In...' : 'Sign In' }}
        </button>


      </form>
    </div>

    <!-- Toggle -->
    <div class="toggle-container">
      <div class="toggle">
        <div class="toggle-panel toggle-left">
          <h1>Welcome Back!</h1>
          <p>Enter your personal details to use all of site features</p>

          <button type="button" class="hidden" (click)="showLogin()">Sign In</button>
        </div>

        <div class="toggle-panel toggle-right">
          <h1>Hello, Friend!</h1>
          <p>Register with your personal details to use all of site features</p>

          <button type="button" class="hidden" (click)="showRegister()">Sign Up</button>
        </div>
      </div>
    </div>
  </div>
</div>
