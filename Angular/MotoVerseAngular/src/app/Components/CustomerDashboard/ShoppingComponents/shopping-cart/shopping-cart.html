<!-- CART OVERLAY -->

<div class="cart-overlay" [class.active]="showCart()">
  <!-- BACKDROP -->
  <div class="cart-backdrop" (click)="toggleCart()"></div>

  <!-- CART PANEL -->
  <div class="cart-panel">
    <!-- HEADER -->
    <div class="cart-header">
      <h2>Shopping Cart</h2>

      <button class="close-btn" (click)="toggleCart()">
        <i class="ri-close-line"></i>
      </button>
    </div>

    <!-- EMPTY -->
    @if (cartItems().length === 0) {
      <div class="empty-cart">
        <i class="ri-shopping-cart-line"></i>
        <p>Your cart is empty</p>
      </div>
    } @else {
      <!-- ITEMS -->
      <div class="cart-items">
        @for (item of cartItems(); track item.id) {
          <div class="cart-item">
            <img
             [src]="
        item.imagePath
          ? 'https://localhost:7081/images/product/' + item.imagePath
          : 'assets/images/defualt.jpg'
      "  [alt]="item.name" />

            <div class="cart-item-content">
              <h4>{{ item.name }}</h4>

              <p>${{ item.price }}</p>

              <div class="quantity-box">
                <button (click)="decreaseQty(item.id)">
                  <i class="ri-subtract-line"></i>
                </button>

                <span>{{ item.quantity }}</span>

                <button (click)="increaseQty(item.id)">
                  <i class="ri-add-line"></i>
                </button>
              </div>
            </div>

            <button class="remove-btn" (click)="removeFromCart(item.id)">
              <i class="ri-delete-bin-line"></i>
            </button>
          </div>
        }
      </div>

      <!-- FOOTER -->
      <div class="cart-footer">
        <div class="total">
          <span>Total</span>
          <h3>${{ totalPrice() }}</h3>
        </div>
        <button class="checkout-btn">Checkout</button>
      </div>
    }
  </div>
</div>
