  <section class="stats">
    <div class="stat-card">
      <div class="label">Total Bookings</div>
      <div class="value">{{stats.totalCount || 0 }}</div>
    </div>
    <div class="stat-card">
      <div class="label">Active Rentals</div>
      <div class="value">{{ stats.bookingActive || 0}}</div>
    </div>
    <div class="stat-card">
      <div class="label">Upcoming Rentals</div>
      <div class="value">{{ stats.bookingPending || 0 }}</div>
    </div>
    <div class="stat-card">
      <div class="label">Completed Rentals</div>
      <div class="value">{{ stats.bookingCompleted || 0 }}</div>
    </div>
  </section>
