  <section class="stats">
    <div class="stat-card">
      <div class="label">Total Bookings</div>
      <div class="value">{{stats.totalCount }}</div>
    </div>
    <div class="stat-card">
      <div class="label">Active Rentals</div>
      <div class="value">{{ stats.bookingActive }}</div>
    </div>
    <div class="stat-card">
      <div class="label">Upcoming Rentals</div>
      <div class="value">{{ stats.bookingPending }}</div>
    </div>
    <div class="stat-card">
      <div class="label">Completed Rentals</div>
      <div class="value">{{ stats.bookingCompleted }}</div>
    </div>
  </section>
